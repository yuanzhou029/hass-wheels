name: AMD64 Wheels Build Only

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-wheels-amd64:
    name: Build wheels for ${{ matrix.abi }}-${{ matrix.tag }}-amd64
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: ["cp313", "cp314"]  # Python版本
        tag: ["musllinux_1_2"]   # 目标平台
        arch: ["amd64"]  # 仅构建AMD64版本，避免跨架构问题
        
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v6.0.2

      - name: Write env-file (if needed for your builds)
        shell: bash
        run: |
          (
            echo "CARGO_NET_GIT_FETCH_WITH_CLI=true"
          ) > .env_file

      - name: Build wheels locally (no upload)
        uses: ./
        with:
          abi: ${{ matrix.abi }}
          tag: ${{ matrix.tag }}
          arch: ${{ matrix.arch }}
          # 关键部分：使用 local-wheels-repo-path 而不是SSH密钥
          local-wheels-repo-path: "/tmp/wheels_output"
          # 清空wheels-host和wheels-user以禁用上传
          wheels-host: ""
          wheels-user: ""
          # 使用不含mysqlclient的简化依赖文件
          requirements: "simple_requirements.txt"
          # 添加必要的开发库
          apk: "postgresql-dev;libffi-dev;openssl-dev"
          
      - name: Upload built wheels as artifacts
        uses: actions/upload-artifact@v7.0.0  # 使用具体版本以避免Node.js警告
        with:
          name: wheels-${{ matrix.arch }}-${{ matrix.abi }}
          path: /tmp/wheels_output/**
          retention-days: 30

  # 合并所有wheel文件到一个artifact
  collect-wheels:
    name: Collect all wheels
    runs-on: ubuntu-latest
    needs: build-wheels-amd64
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4.1.7  # 使用具体版本以避免Node.js警告
        with:
          path: ./all_wheels

      - name: Combine all wheels
        run: |
          mkdir -p ./combined_wheels
          find ./all_wheels -name "*.whl" -exec cp {} ./combined_wheels/ \;

      - name: Upload combined wheels
        uses: actions/upload-artifact@v7.0.0  # 使用具体版本以避免Node.js警告
        with:
          name: all-built-wheels
          path: ./combined_wheels/**
          retention-days: 30