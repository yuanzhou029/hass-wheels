name: 测试 Hass-Wheels 构建
on:
  workflow_dispatch:  # 这样我们可以手动触发构建
    inputs:
      target_package:
        description: "要构建的包名"
        required: true
        default: "requests"
jobs:
  build-wheels-test:
    runs-on: ubuntu-latest
    
    steps:
      # 第一步：检出代码
      - name: 检出代码
        uses: actions/checkout@v4
      
      # 添加这一步：列出当前目录文件，确认 requirements_test.txt 存在
      - name: 检查文件
        run: |
          pwd
          ls -la
          cat requirements_test.txt
      
      # 第二步：获取 Home Assistant 官方依赖作为对比
      - name: 获取官方依赖列表
        run: |
          curl -o ha-requirements.txt https://raw.githubusercontent.com/home-assistant/core/dev/requirements.txt
      
      # 第三步：使用 hass-wheels 构建
      - name: 使用 Hass-Wheels 构建包
        uses: yuanzhou029/hass-wheels@main
        with:
          # 配置构建参数
          abi: cp314              # Python 3.14 版本
          tag: musllinux_1_2      # Alpine Linux 系统标识
          arch: amd64             # 架构类型
          
          # 本地输出设置（不上传到远程服务器）
          local-wheels-repo-path: "/tmp/test-wheels"
          wheels-host: ""
          wheels-user: ""
          
          # 要构建的包列表 - 使用正确的文件名
          requirements: "requirements_test.txt"
          
          # 构建所需的系统包
          apk: "libffi-dev;openssl-dev;gcc;g++;linux-headers;zlib-dev"
      
      # 第四步：检查输出目录
      - name: 检查输出目录
        run: |
          ls -la /tmp/ || echo "Tmp directory listing failed"
          ls -la /tmp/test-wheels/ || echo "Output directory is empty"
          find /tmp/ -name "*.whl" || echo "No wheel files found anywhere"
          find /tmp/test-wheels -name "*.whl" || echo "No wheel files in expected location"
      
      # 第五步：保存构建结果（只有目录存在时才执行）
      - name: 上传构建结果
        if: always()  # 即使前面步骤失败也会运行
        uses: actions/upload-artifact@v4
        with:
          name: 构建结果
          path: /tmp/test-wheels/**
          if-no-files-found: ignore  # 如果没有文件也忽略错误
