name: Minimal Wheels Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-wheels-minimal:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v6.0.2

      - name: Build wheels locally (excluding problematic packages)
        uses: ./
        with:
          abi: cp313
          tag: musllinux_1_2
          arch: amd64
          # 不需要WHEELS_KEY
          local-wheels-repo-path: "/tmp/output"
          wheels-host: ""
          wheels-user: ""
          # 使用不含mysqlclient的简化依赖文件
          requirements: "simple_requirements.txt"
          # 仍然安装必要的开发库
          apk: "postgresql-dev;libffi-dev;openssl-dev"

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v7  # 使用具体版本以避免Node.js警告
        with:
          name: minimal-built-wheels
          path: /tmp/output/**
          retention-days: 30